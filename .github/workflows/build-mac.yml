name: Build macOS Release

# Called by the Release workflow with an explicit version, or triggered
# directly by pushing a v* tag (manual fallback).
on:
  workflow_call:
    inputs:
      version:
        description: "Version to build (x.y.z). Omit to use the pushed tag."
        required: false
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then V="${{ inputs.version }}"; else V="${{ github.ref_name }}"; V="${V#v}"; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"

      - name: Checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.ver.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            PySide6 \
            numpy \
            demucs \
            torch torchaudio \
            soundfile sounddevice \
            yt-dlp imageio-ffmpeg \
            mutagen pyacoustid \
            pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller installer/rehearsalroom_mac.spec

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          mkdir -p dist/dmg
          cp -r "dist/RehearsalRoom.app" dist/dmg/
          create-dmg \
            --volname "Rehearsal Room" \
            --volicon "assets/icons/app.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 128 \
            --icon "RehearsalRoom.app" 175 190 \
            --hide-extension "RehearsalRoom.app" \
            --app-drop-link 425 190 \
            "dist/RehearsalRoom-v${VERSION}-mac.dmg" \
            "dist/dmg/" \
          || true   # create-dmg exits 1 even on success if no signing identity
          # Fallback: plain hdiutil if create-dmg produced nothing
          if [ ! -f "dist/RehearsalRoom-v${VERSION}-mac.dmg" ]; then
            hdiutil create \
              -volname "Rehearsal Room" \
              -srcfolder dist/dmg \
              -ov -format UDZO \
              "dist/RehearsalRoom-v${VERSION}-mac.dmg"
          fi

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: dist/RehearsalRoom-v*-mac.dmg
          fail_on_unmatched_files: true
