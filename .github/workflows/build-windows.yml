name: Build Windows Release

# Called by the Release workflow with an explicit version, or triggered
# directly by pushing a v* tag (manual fallback).
on:
  workflow_call:
    inputs:
      version:
        description: "Version to build (x.y.z). Omit to use the pushed tag."
        required: false
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then V="${{ inputs.version }}"; else V="${{ github.ref_name }}"; V="${V#v}"; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V" >> "$GITHUB_OUTPUT"

      - name: Checkout source
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.ver.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch (matches the other platforms; keeps the bundle small).
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install `
            PySide6 `
            numpy `
            demucs `
            soundfile sounddevice `
            yt-dlp imageio-ffmpeg `
            mutagen pyacoustid `
            pyinstaller

      # build.bat runs PyInstaller + Inno Setup and writes
      # installer\output\RehearsalRoom-v<version>-Setup.exe. It finds ISCC at
      # the Program Files (x86) path Chocolatey installs to.
      - name: Build executable and installer
        shell: cmd
        run: call build.bat ${{ steps.ver.outputs.version }}

      - name: Upload installer to release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: installer/output/RehearsalRoom-v*-Setup.exe
          fail_on_unmatched_files: true
