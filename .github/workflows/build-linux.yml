name: Build Linux Release

# Triggers whenever release.bat pushes a version tag (e.g. v1.0.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    # Build inside manylinux_2_28 (glibc 2.28) so the result runs on older
    # distros. Building directly on ubuntu-22.04 links against glibc 2.35, so
    # the bundled libpython demands >= 2.35 and fails on anything older. 2.28 is
    # the floor PySide6/torch wheels themselves need, and the minimum glibc that
    # GitHub's Node-based actions require — so it's the lowest practical target.
    # Covers Ubuntu 20.04+, Debian 10+, Fedora 29+, RHEL/CentOS 8+.
    container: quay.io/pypa/manylinux_2_28_x86_64
    env:
      # The venv built from AlmaLinux's shared-library python3.11 (see below).
      PYBIN: /opt/venv/bin

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # System libraries the Qt .so's link against (so PyInstaller can import
      # PySide6 during the build) plus a shared-library Python. manylinux's
      # /opt/python interpreters are STATIC (no libpython.so), which PyInstaller
      # rejects; AlmaLinux 8's python3.11 is a shared build, so we use it via a
      # venv. (AlmaLinux 8 base — dnf, not apt.)
      - name: Install system dependencies
        run: |
          dnf install -y \
            python3.11 python3.11-devel python3.11-pip \
            mesa-libGL mesa-libEGL \
            libxkbcommon libxkbcommon-x11 \
            libX11 libXext libXrender fontconfig freetype \
            dbus-libs glib2 \
            xcb-util-cursor xcb-util-image xcb-util-keysyms \
            xcb-util-renderutil xcb-util-wm \
            wget file
          # Use the dnf python by ABSOLUTE path: bare `python3.11` resolves to
          # manylinux's static interpreter (which shadows /usr/bin on PATH), and
          # PyInstaller needs a shared-library build. AlmaLinux's /usr/bin one is
          # shared. Fail fast if that ever stops being true.
          /usr/bin/python3.11 -m venv /opt/venv
          /opt/venv/bin/python -c "import sysconfig, sys; sys.exit(0 if sysconfig.get_config_var('Py_ENABLE_SHARED') else 'ERROR: venv python is static (no libpython.so)')"

      - name: Install Python dependencies
        run: |
          $PYBIN/pip install --upgrade pip
          # CPU-only torch. On Linux `pip install torch` defaults to the CUDA
          # build (bundles nvidia-* libs, ~2.5 GB) — which blows past GitHub's
          # 2 GB release-asset limit and isn't needed (GPU is a separate
          # on-demand feature). Install it first so demucs reuses it.
          $PYBIN/pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          $PYBIN/pip install \
            PySide6 \
            numpy \
            demucs \
            soundfile sounddevice \
            yt-dlp imageio-ffmpeg \
            mutagen pyacoustid \
            pyinstaller

      - name: Build with PyInstaller
        run: $PYBIN/pyinstaller installer/rehearsalroom_linux.spec

      # ── Tarball ────────────────────────────────────────────────────────
      - name: Create tarball
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"   # strip leading 'v'
          tar -C dist -czf "dist/RehearsalRoom-v${VERSION}-linux-x86_64.tar.gz" RehearsalRoom

      # ── AppImage ───────────────────────────────────────────────────────
      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: 1   # GitHub runners lack FUSE
        run: |
          export PATH="$PYBIN:$PATH"   # so the icon-placeholder `python` resolves
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          # Assemble the AppDir from the PyInstaller one-folder output.
          APPDIR=RehearsalRoom.AppDir
          mkdir -p "$APPDIR/usr/bin"
          cp -r dist/RehearsalRoom/. "$APPDIR/usr/bin/"

          # AppRun launches the bundled executable.
          cat > "$APPDIR/AppRun" <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/RehearsalRoom" "$@"
          EOF
          chmod +x "$APPDIR/AppRun"

          # Desktop entry.
          cat > "$APPDIR/RehearsalRoom.desktop" <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Rehearsal Room
          Exec=RehearsalRoom
          Icon=RehearsalRoom
          Categories=AudioVideo;Audio;
          Terminal=false
          EOF

          # Icon: use a bundled PNG if present, otherwise generate a placeholder
          # (appimagetool requires an icon matching the desktop entry's Icon=).
          ICON_SRC=$(find assets -iname '*.png' 2>/dev/null | head -n1 || true)
          if [ -n "$ICON_SRC" ]; then
            cp "$ICON_SRC" "$APPDIR/RehearsalRoom.png"
          else
            python - <<'PY'
          import struct, zlib
          w = h = 256
          px = bytes((0xD2, 0x55, 0x2E))          # brand orange, opaque
          row = b'\x00' + (px + b'\xff') * w       # filter byte + RGBA pixels
          raw = row * h
          def chunk(tag, data):
              return (struct.pack('>I', len(data)) + tag + data
                      + struct.pack('>I', zlib.crc32(tag + data) & 0xffffffff))
          png = (b'\x89PNG\r\n\x1a\n'
                 + chunk(b'IHDR', struct.pack('>IIBBBBB', w, h, 8, 6, 0, 0, 0))
                 + chunk(b'IDAT', zlib.compress(raw, 9))
                 + chunk(b'IEND', b''))
          open('RehearsalRoom.AppDir/RehearsalRoom.png', 'wb').write(png)
          PY
          fi

          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage "$APPDIR" \
            "dist/RehearsalRoom-v${VERSION}-x86_64.AppImage"

      # ── Upload both artifacts to the GitHub Release ────────────────────
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          # The release was already created by release.bat on Windows;
          # this step attaches the Linux artifacts to it.
          files: |
            dist/RehearsalRoom-v*-linux-x86_64.tar.gz
            dist/RehearsalRoom-v*-x86_64.AppImage
          fail_on_unmatched_files: true
